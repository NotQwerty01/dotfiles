font_family Fira Nerd Font Mono
font_size   12

disable_ligatures yes
enable_audio_bell no

sehll             zsh
shell_integration disabled

cursor_shape block

url_style curly

remember_window_size  no
initial_window_width  640
initial_window_height 480
window_padding_width  0
cursor_blink_interval 0

background_opacity            0.80
scrollbar_handle_opacity      0
scrollbar_track_opacity       0
scrollbar_track_hover_opacity 0
confirm_os_window_close       0

sync_to_monitor no


# Theme: Bamboo_multiplex
background #1d2021
foreground #d4be98

selection_background #d4be98
selection_foreground #1d2021

cursor #a89984
cursor_text_color background

active_tab_background #1d2021
active_tab_foreground #d4be98
active_tab_font_style bold
inactive_tab_background #1d2021
inactive_tab_foreground #a89984
inactive_tab_font_style normal

